services:
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pw
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fastapi-backend
    command: python -m app.main
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://tasks_user:tasks_pw@db:5432/tasks
      JWT_SECRET: change-me-in-production
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
      
  frontend:
    build: ./frontend
    container_name: react-frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
