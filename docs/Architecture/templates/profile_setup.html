<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card wide">
      <h1 class="auth-title">Set up your profile</h1>
      <p class="auth-sub">Tell us your preferences so we can personalise your experience</p>

      <form id="profileForm">
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">Select...</option>
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Prefer not to say</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="topSize">Top size</label>
            <select id="topSize" name="topSize">
              <option value="">Select...</option>
              <option>XS</option><option>S</option><option>M</option>
              <option>L</option><option>XL</option><option>XXL</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bottomSize">Bottom size</label>
            <select id="bottomSize" name="bottomSize">
              <option value="">Select...</option>
              <option>XS</option><option>S</option><option>M</option>
              <option>L</option><option>XL</option><option>XXL</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Style preferences</label>
          <div class="checkbox-grid">
            <label class="checkbox-label"><input type="checkbox" name="style" value="casual"> Casual</label>
            <label class="checkbox-label"><input type="checkbox" name="style" value="formal"> Formal</label>
            <label class="checkbox-label"><input type="checkbox" name="style" value="sporty"> Sporty</label>
            <label class="checkbox-label"><input type="checkbox" name="style" value="vintage"> Vintage</label>
            <label class="checkbox-label"><input type="checkbox" name="style" value="streetwear"> Streetwear</label>
            <label class="checkbox-label"><input type="checkbox" name="style" value="minimalist"> Minimalist</label>
          </div>
        </div>

        <div class="form-group">
          <label for="exclusions">Anything to exclude? (e.g. leather, fur)</label>
          <input type="text" id="exclusions" name="exclusions" placeholder="Type and press Enter">
          <div id="exclusion-tags" class="tag-container"></div>
        </div>

        <button type="submit" class="btn-primary">Save profile</button>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
