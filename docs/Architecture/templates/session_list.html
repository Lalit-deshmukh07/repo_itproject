<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Reports - WearItRight</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/homepage.css') }}">
  </head>
  <body>
    <header>
      <h1>Session Reports</h1>
      <p>Review project updates from team members.</p>
      <p><a href="{{ url_for('home') }}">Back to home</a></p>
    </header>
    <main>
      <ul>
        {% if sessions %}
          {% for session in sessions %}
            <li><a href="{{ url_for('session_detail', session_name=session) }}">{{ session }}</a></li>
          {% endfor %}
        {% else %}
          <li>No session reports available.</li>
        {% endif %}
      </ul>
    </main>
  </body>
</html>
