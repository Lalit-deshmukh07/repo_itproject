<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup - WearItRight</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <style>
    .profile-setup-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-setup-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      padding: 50px;
    }

    .profile-setup-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .profile-setup-header h1 {
      font-size: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .profile-setup-header p {
      color: #6b7280;
      font-size: 16px;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title-icon {
      font-size: 24px;
    }

    .form-row-double {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-group select {
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: white;
      cursor: pointer;
    }

    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
    }

    .style-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .style-option:hover {
      border-color: #667eea;
      background: #f3f4f6;
      transform: translateY(-2px);
    }

    .style-option input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #667eea;
    }

    .style-option input[type="checkbox"]:checked + label {
      color: #667eea;
      font-weight: 600;
    }

    .style-option.checked {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }

    .style-option label {
      cursor: pointer;
      margin: 0;
      font-weight: 500;
      color: #374151;
      flex: 1;
    }

    .style-icon {
      font-size: 20px;
    }

    .exclusion-input-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .exclusion-input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .exclusion-input-wrapper input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .tag button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      margin-left: 4px;
      transition: all 0.2s ease;
    }

    .tag button:hover {
      transform: scale(1.2);
    }

    .btn-save {
      width: 100%;
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      margin-top: 20px;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .form-row-double {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .profile-setup-card {
        padding: 30px 20px;
      }

      .style-grid {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="profile-setup-container">
    <div class="profile-setup-card">
      <div class="profile-setup-header">
        <h1>✨ Complete Your Profile</h1>
        <p>Help us personalize your outfit recommendations</p>
      </div>

      <form id="profileForm">
        <!-- Sizes Section -->
        <div class="form-section">
          <div class="section-title">
            <span class="section-title-icon">📏</span>
            Your Measurements
          </div>
          <div class="form-row-double">
            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender" name="gender">
                <option value="">Select your gender...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="topSize">Top Size</label>
                <select id="topSize" name="topSize">
                  <option value="">Select...</option>
                  <option value="XS">XS</option>
                  <option value="S">S</option>
                  <option value="M">M</option>
                  <option value="L">L</option>
                  <option value="XL">XL</option>
                  <option value="XXL">XXL</option>
                </select>
              </div>
              <div class="form-group">
                <label for="bottomSize">Bottom Size</label>
                <select id="bottomSize" name="bottomSize">
                  <option value="">Select...</option>
                  <option value="XS">XS</option>
                  <option value="S">S</option>
                  <option value="M">M</option>
                  <option value="L">L</option>
                  <option value="XL">XL</option>
                  <option value="XXL">XXL</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Style Preferences Section -->
        <div class="form-section">
          <div class="section-title">
            <span class="section-title-icon">🎨</span>
            Choose Your Styles (Pick at least one)
          </div>
          <div class="style-grid" id="styleGrid">
            <label class="style-option">
              <input type="checkbox" name="style" value="casual">
              <span class="style-icon">👕</span>
              <label>Casual</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="formal">
              <span class="style-icon">🤵</span>
              <label>Formal</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="sporty">
              <span class="style-icon">⚽</span>
              <label>Sporty</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="vintage">
              <span class="style-icon">🎭</span>
              <label>Vintage</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="streetwear">
              <span class="style-icon">🎤</span>
              <label>Streetwear</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="minimalist">
              <span class="style-icon">⚪</span>
              <label>Minimalist</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="bohemian">
              <span class="style-icon">🌸</span>
              <label>Bohemian</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="preppy">
              <span class="style-icon">🎓</span>
              <label>Preppy</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="edgy">
              <span class="style-icon">⚡</span>
              <label>Edgy</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="romantic">
              <span class="style-icon">💕</span>
              <label>Romantic</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="classic">
              <span class="style-icon">👔</span>
              <label>Classic</label>
            </label>
            <label class="style-option">
              <input type="checkbox" name="style" value="experimental">
              <span class="style-icon">🚀</span>
              <label>Experimental</label>
            </label>
          </div>
        </div>

        <!-- Exclusions Section -->
        <div class="form-section">
          <div class="section-title">
            <span class="section-title-icon">🚫</span>
            Items to Exclude (Optional)
          </div>
          <div class="exclusion-input-wrapper">
            <input type="text" id="exclusions" placeholder="Type items to exclude (e.g., leather, fur, synthetic) and press Enter">
          </div>
          <div class="tag-container" id="exclusion-tags"></div>
        </div>

        <button type="submit" class="btn-save">💾 Save My Profile</button>
      </form>
    </div>
  </div>

  <script>
    // Add interactive feedback to style options
    document.querySelectorAll('.style-option input[type="checkbox"]').forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        const option = this.closest('.style-option');
        if (this.checked) {
          option.classList.add('checked');
        } else {
          option.classList.remove('checked');
        }
      });
    });
  </script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
